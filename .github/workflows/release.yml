name: Release

on:
  push:
    branches:
      - master

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=\${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Build
        run: pnpm build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.PUSH_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Release (versioning, tags, changelog, GitHub release)
        id: github_release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.PUSH_TOKEN }}

      - name: Pull updated package.json after semantic-release
        if: success()
        run: git pull origin master

      - name: Verify release tag
        if: success()
        run: |
          CURRENT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "Current tag: $CURRENT_TAG"
          if [ "$CURRENT_TAG" = "none" ]; then
            echo "No new tag created - skipping npm publish"
            exit 1
          fi
          echo "NEW_TAG=$CURRENT_TAG" >> "$GITHUB_ENV"

      - name: Publish to npm
        if: success()
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
